<main>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SkillMatch Web</title>

    <meta name="description"
        content="Sistema para análise de compatibilidade entre candidatos e vagas de tecnologia.">

    <link rel="stylesheet" href="./assets/styles/index.style.css">
</head>

    <section id="perfil">

        <h2>Perfil do Candidato</h2>

        <form id="form-perfil">

            <label for="nome">Nome</label>
            <input
                type="text"
                id="nome"
                required
            >

            <label for="area">Área</label>
            <select id="area">

                <option value="Front-End">Front-End</option>
                <option value="Full Stack">Full Stack</option>

            </select>

            <label for="habilidades">
                Habilidades
            </label>

            <input
                type="text"
                id="habilidades"
                placeholder="HTML, CSS, JavaScript..."
            >

            <label for="experiencia">
                Experiência (meses)
            </label>

            <input
                type="number"
                id="experiencia"
            >

            <button type="submit">

                Analisar Perfil

            </button>

        </form>

    </section>

    <section id="vagas">

    </section>

    <section id="melhor-vaga">

    </section>

</main>
